detection:
  default:
    strategy: timeout
    timeout_seconds: 90             # fallback sempre presente

  overrides:
    kof99.zip:
      strategy: fbneo_session
      fbneo_neo_ram_base: 0x2A400000  # descoberto via Cheat Engine
      continue_window_seconds: 15     # KOF99 dá ~10s de continue
      
    kof2002.zip:
      strategy: fbneo_session
      fbneo_neo_ram_base: 0x2A400000
      continue_window_seconds: 15

    garou.zip:
      strategy: fbneo_session
      fbneo_neo_ram_base: 0x2A400000
      continue_window_seconds: 12     # Garou tem janela menor

rotation:
  franchise_bias: 0.85   # alta probabilidade de manter na mesma franquia
  anti_repeat_count: 2   # evita repetir o jogo imediatamente